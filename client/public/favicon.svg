<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF6B00" />
            <stop offset="100%" stop-color="#E05300" />
        </linearGradient>
        <filter id="subtle-shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
        </filter>
    </defs>

    <!-- Engrenage de Maintenance -->
    <path d="M256,160 C203,160 160,203 160,256 C160,309 203,352 256,352 C309,352 352,309 352,256 C352,203 309,160 256,160 Z" fill="none" stroke="url(#brandGrad)" stroke-width="24"/>
    
    <g fill="url(#brandGrad)">
        <rect x="244" y="112" width="24" height="32" rx="6" />
        <rect x="244" y="368" width="24" height="32" rx="6" />
        <rect x="112" y="244" width="32" height="24" rx="6" />
        <rect x="368" y="244" width="32" height="24" rx="6" />
        
        <rect x="244" y="112" width="24" height="32" rx="6" transform="rotate(45 256 256)" />
        <rect x="244" y="112" width="24" height="32" rx="6" transform="rotate(-45 256 256)" />
        <rect x="244" y="368" width="24" height="32" rx="6" transform="rotate(45 256 256)" />
        <rect x="244" y="368" width="24" height="32" rx="6" transform="rotate(-45 256 256)" />
    </g>

    <!-- Silhouette du Véhicule -->
    <g fill="#FFFFFF" filter="url(#subtle-shadow)">
        <path d="M196,216 L316,216 L336,256 L176,256 Z" opacity="0.9" />
        <path d="M160,256 L352,256 C364,256 372,264 372,276 L372,312 C372,318 368,324 362,324 L150,324 C144,324 140,318 140,312 L140,276 C140,264 148,256 160,256 Z" />
        
        <!-- Phares Orange (Rappel Charte Graphique) -->
        <circle cx="176" cy="284" r="10" fill="url(#brandGrad)" />
        <circle cx="336" cy="284" r="10" fill="url(#brandGrad)" />
        
        <!-- Calandre et Roues -->
        <rect x="216" y="280" width="80" height="12" rx="4" fill="#1E1E24" />
        <rect x="168" y="324" width="28" height="14" rx="4" fill="#1E1E24" />
        <rect x="316" y="324" width="28" height="14" rx="4" fill="#1E1E24" />
    </g>
    
    <!-- Détails Outils / Clé Mécanique -->
    <path d="M140,140 L170,170 M130,150 L160,180" stroke="url(#brandGrad)" stroke-width="12" stroke-linecap="round" />
    <g fill="url(#brandGrad)" transform="translate(340, 120) rotate(45) scale(0.8)">
        <path d="M0,45 L15,45 L15,15 L30,15 C35,15 40,10 40,5 C40,-5 30,-10 20,-10 C5,-10 -10,5 -10,25 C-10,35 -5,40 0,45 Z" opacity="0.95"/>
    </g>
</svg>
